packages:
  - packages/*
  - apps/*

allowBuilds:
  '@parcel/watcher': true
  "@swc/core": true
  esbuild: true
  sharp: true

catalog:
  react: ^19.2.7
  react-dom: ^19.2.7
  typescript: ^6.0.3
  tailwindcss: ^4.3.2
  "@tailwindcss/cli": ^4.3.2
  "@tailwindcss/vite": ^4.3.2
  next: ^16.2.10
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@types/node": ^26.1.0
  "@biomejs/biome": ^2.5.2
  tsup: ^8.5.1
  vitest: ^3.2.6
  tw-animate-css: ^1.4.0

minimumReleaseAgeExclude:
  - '@manovaspace/tsconfig@0.1.1'
